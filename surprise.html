<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Surprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body, html {
            height: 100vh;
            width: 100vw;
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #e0e0e0;
            font-family: 'Space Mono', monospace;
            overflow: hidden;
            display: flex;
            align-items: center; 
            justify-content: center; 
            touch-action: manipulation;
        }

        /* --- SCREEN CONTAINERS --- */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease;
        }
        .active-screen {
            opacity: 1;
            pointer-events: auto;
        }

        /* --- START SCREEN (BROKEN HEARTS) --- */
        #start-screen { background-color: #000000; cursor: pointer; }
        
        .split-hearts-container {
            position: relative;
            width: clamp(200px, 35vmin, 350px); 
            height: clamp(200px, 35vmin, 350px);
            margin-bottom: 70px;
            display: flex; 
        }
        
        .heart-half {
            position: relative; 
            width: 50%; 
            height: 100%; 
            transition: transform 2.5s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        .heart-half img {
            width: 100%; 
            height: 100%; 
            object-fit: fill; 
            image-rendering: pixelated; 
        }
        
        .left-half { transform: translateX(-130%); } 
        .right-half { transform: translateX(130%); } 
        .merged .left-half, .merged .right-half { transform: translateX(0); }

        .name-label {
            position: absolute;
            bottom: -40px; 
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(0.9rem, 2vmin, 1.2rem);
            color: #ff6b81;
            transition: opacity 0.5s ease;
            white-space: nowrap; 
            letter-spacing: 1px;
            font-weight: bold;
        }

        /* --- SCREEN SHAKE EFFECT --- */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-3px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(0px, 0px) rotate(0deg); }
        }
        .shake-active { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        
        #establishing-text {
            font-size: clamp(1rem, 2.5vmin, 1.2rem);
            color: #888;
            opacity: 0;
            transition: opacity 1s ease;
            margin-top: 10px; 
        }

        /* --- CONNECTION LOST & RECONNECTING --- */
        #lost-screen { background-color: #000000; }
        .warning-icon { font-size: clamp(3rem, 8vmin, 5rem); margin-bottom: 15px; animation: glowRed 1s infinite alternate; }
        .lost-text { color: #ef5350; font-size: clamp(1.5rem, 4vmin, 2.5rem); font-weight: bold; }

        @keyframes glowRed {
            from { text-shadow: 0 0 5px #ef5350; }
            to { text-shadow: 0 0 20px #ef5350; }
        }

        #reconnect-screen { background-color: #000000; }
        .reconnect-text { color: #4CAF50; font-size: clamp(1rem, 2.5vmin, 1.2rem); margin-top: 25px; }

        .mc-heart-box { 
            position: relative; 
            width: clamp(150px, 25vmin, 250px); 
            height: clamp(150px, 25vmin, 250px); 
        }
        
        .heart-fill-wrapper {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            height: 0%;
            overflow: hidden;
            transition: height 3s linear; 
        }
        
        .heart-red {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: contain;
            object-position: bottom;
            image-rendering: pixelated;
        }

        /* --- TERMINAL (TYPEWRITER) --- */
        #terminal-box {
            position: relative;
            width: 90%;
            max-width: 800px; 
            font-size: clamp(0.9rem, 2.5vmin, 1.4rem); 
            line-height: clamp(1.4, 3.5vmin, 1.9);
            text-align: center; 
            transition: opacity 0.5s;
        }
        
        .type-char { transition: opacity 0.1s; }

        .cursor {
            display: inline-block;
            width: 10px; height: 1.2em; 
            background-color: #ff6b81; 
            vertical-align: middle;
            margin-left: 2px; margin-right: -12px; 
            animation: blink 1s step-end infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* --- FINAL SCREEN --- */
        #final-screen { background-color: #000000; font-family: -apple-system, sans-serif; }
        
        #tap-catcher {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; cursor: pointer;
        }

        .ui-text {
            position: absolute; bottom: 40px; color: #666; font-size: clamp(0.7rem, 2vmin, 0.9rem);
            letter-spacing: 2px; text-transform: uppercase; transition: opacity 0.5s;
            pointer-events: none;
        }

        #emoji-scene { 
            position: relative; 
            width: clamp(200px, 35vmin, 350px); 
            height: clamp(200px, 35vmin, 350px); 
        }
        .emoji-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .float-controller { transform: translateY(100vh) scale(0.5); opacity: 0; }
        .begin-float {
            animation: floatUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards,
                       bobble 3s ease-in-out infinite 1.2s;
        }

        #impact-container { transform-origin: center; transition: opacity 0.1s; }
        .trigger-impact { animation: hitShake 0.4s cubic-bezier(.36,.07,.19,.97) both; }

        .arrow-layer {
            opacity: 0;
            transform: translate(-100vw, -100vh); 
        }
        .shoot-arrow { animation: strikeIn 0.1s linear forwards; }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.3); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        @keyframes bobble {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes strikeIn {
            0% { transform: translate(-100vw, -100vh); opacity: 0; }
            1% { opacity: 1; }
            100% { transform: translate(0, 0); opacity: 1; }
        }

        @keyframes hitShake {
            0% { transform: scale(1) rotate(0deg); }
            20% { transform: scale(0.9) translate(15px, 15px) rotate(-8deg); }
            40% { transform: scale(1.05) translate(-8px, -8px) rotate(4deg); }
            60% { transform: scale(0.98) translate(4px, 4px) rotate(-2deg); }
            80% { transform: scale(1.02) translate(-2px, -2px) rotate(1deg); }
            100% { transform: scale(1) translate(0,0) rotate(0deg); }
        }

        /* Thanos Dust Particles */
        .dust-particle {
            position: absolute;
            border-radius: 1px;
            pointer-events: none;
            z-index: 1000;
        }

    </style>
</head>
<body>

    <div id="start-screen" class="screen active-screen" onclick="startSequence()">
        <div class="split-hearts-container" id="split-hearts">
            <div class="heart-half left-half">
                <img src="REPLACE_WITH_LEFT_HEART_LINK.png" alt="Left Heart">
                <div class="name-label" id="lbl-beet">BEETROOT</div>
            </div>
            <div class="heart-half right-half">
                <img src="REPLACE_WITH_RIGHT_HEART_LINK.png" alt="Right Heart">
                <div class="name-label" id="lbl-angry">Angrybird</div>
            </div>
        </div>
        <div id="establishing-text">Establishing Connection...</div>
    </div>

    <div id="terminal-screen" class="screen">
        <div id="terminal-box"></div>
    </div>

    <div id="lost-screen" class="screen">
        <div class="warning-icon">⚠️</div>
        <div class="lost-text">Connection Lost</div>
    </div>

    <div id="reconnect-screen" class="screen">
        <div class="mc-heart-box">
            <div class="heart-fill-wrapper" id="fill-wrapper">
                <img src="REPLACE_WITH_WHOLE_HEART_LINK.png" alt="Whole Heart" class="heart-red">
            </div>
        </div>
        <div class="reconnect-text">Connection Restablishing...</div>
    </div>

    <div id="final-screen" class="screen">
        <div id="tap-catcher"></div>
        <div class="ui-text" id="final-ui-text">tap anywhere to continue</div>

        <div id="emoji-scene">
            <div id="float-container" class="emoji-layer float-controller">
                <div id="impact-container" class="emoji-layer">
                    
                    <svg class="emoji-layer arrow-layer arrow-back" viewBox="0 0 250 250">
                        <line x1="40" y1="40" x2="100" y2="100" stroke="#b07d5b" stroke-width="8" stroke-linecap="round"/>
                        <path fill="#ffffff" stroke="#d1d1d1" stroke-width="2" d="M 40,40 L 20,20 L 50,20 Z" />
                        <path fill="#ffffff" stroke="#d1d1d1" stroke-width="2" d="M 40,40 L 20,20 L 20,50 Z" />
                    </svg>

                    <svg class="emoji-layer" viewBox="0 0 250 250">
                        <path fill="#ff3b30" d="M125,210 C125,210 25,135 25,75 C25,35 55,15 85,35 C105,48 125,70 125,70 C125,70 145,48 165,35 C195,15 225,35 225,75 C225,135 125,210 125,210 Z"/>
                        <path fill="#ff6961" d="M50,75 C50,55 65,40 85,50 C90,52 75,55 60,75 C55,85 50,75 50,75 Z" opacity="0.6"/>
                    </svg>

                    <svg class="emoji-layer arrow-layer arrow-front" viewBox="0 0 250 250">
                        <line x1="150" y1="150" x2="210" y2="210" stroke="#b07d5b" stroke-width="8" stroke-linecap="round"/>
                        <polygon points="230,230 190,210 210,190" fill="#ced4da"/>
                        <polygon points="230,230 190,210 210,210" fill="#adb5bd"/>
                    </svg>

                </div>
            </div>
        </div>
    </div>

    <script>
        // --- TEXT DATA ---
        const part1 = "i made this whole thing just for you.*in last few months it has been very hard for us ,*a lot of things happened ,*a lot of decisions that caused a lot of things .*i don't know what you were thinking ,*what made you do this ,*you were experimenting or whatever you were doing ,*those days were too harsh on me ,*but now there is nothing we can do about it ,*i learned my lessons to not love someone the same way i did ,*and I hope you also learned your lesson about priority and etc-etc ,*I have not made it this whole thing just to make you hear all this ,*Leave this.*Let's start a new chapter ,*A fresh start ,*This time let's give us one more nice and good chance ,*there is nothing else we can do ,*Just this time do take care of things ,";
        const part2 = "You are the best thing that happened to me ,*you think I regret choosing you over anyone ,*Trust me ,*I am still thankful to myself and will forever be ,*too choose you ,*Let's start fresh**#-your angrybird ⚡";

        // --- CONSTANTS ---
        const AUDIO_VOLUME = 0.08; 
        const BASE_TYPE_SPEED = 120; 
        const PUNCTUATION_PAUSE = 900; 

        // --- ELEMENTS ---
        const sStart = document.getElementById('start-screen');
        const sTerm = document.getElementById('terminal-screen');
        const sLost = document.getElementById('lost-screen');
        const sReconn = document.getElementById('reconnect-screen');
        const sFinal = document.getElementById('final-screen');
        const tBox = document.getElementById('terminal-box');
        
        let audioCtx;
        let isStarted = false;
        let typeIndex = 0;
        let typeChars = [];
        const cursor = document.createElement('span');
        cursor.className = 'cursor';

        // --- AUDIO ENGINE ---
        function playTypingSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'square'; 
            osc.frequency.setValueAtTime(320 + Math.random() * 60, audioCtx.currentTime); 
            
            gainNode.gain.setValueAtTime(AUDIO_VOLUME, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.035);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.035);
        }

        function switchScreen(showElement) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            showElement.classList.add('active-screen');
        }

        function prepareText(textStr) {
            tBox.innerHTML = '';
            let isPink = false;
            for (let char of textStr) {
                if (char === '*') {
                    tBox.appendChild(document.createElement('br'));
                } else if (char === '#') {
                    isPink = true;
                } else {
                    let sp = document.createElement('span');
                    sp.className = 'type-char';
                    sp.style.opacity = '0'; 
                    sp.innerHTML = char === ' ' ? '&nbsp;' : char;
                    if (isPink) sp.style.color = '#ff6b81';
                    tBox.appendChild(sp);
                }
            }
            if(tBox.firstChild) {
                tBox.insertBefore(cursor, tBox.firstChild);
            } else {
                tBox.appendChild(cursor);
            }
            typeChars = tBox.querySelectorAll('.type-char');
            typeIndex = 0;
        }

        function typeNext(callback) {
            if (typeIndex < typeChars.length) {
                let charNode = typeChars[typeIndex];
                charNode.style.opacity = '1';
                charNode.after(cursor); 
                playTypingSound();

                let charVal = charNode.innerText;
                let delay = Math.random() * 30 + BASE_TYPE_SPEED; 
                if (charVal === ',' || charVal === '.') delay = PUNCTUATION_PAUSE; 

                typeIndex++;
                setTimeout(() => typeNext(callback), delay);
            } else {
                cursor.style.display = 'none'; 
                if (callback) callback();
            }
        }

        // --- PHASE 1: START SEQUENCE ---
        function startSequence() {
            if (isStarted) return;
            isStarted = true;
            
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            document.getElementById('split-hearts').classList.add('merged');
            document.getElementById('lbl-beet').style.opacity = '0';
            document.getElementById('lbl-angry').style.opacity = '0';
            
            setTimeout(() => {
                document.getElementById('start-screen').classList.add('shake-active');
                document.getElementById('establishing-text').style.opacity = '1';
                playTypingSound();
                setTimeout(playTypingSound, 100);

                setTimeout(() => {
                    switchScreen(sTerm);
                    prepareText(part1);
                    setTimeout(() => {
                        cursor.style.display = 'inline-block';
                        typeNext(triggerConnectionLost); 
                    }, 800);
                }, 1500);

            }, 2500); 
        }

        // --- PHASE 2: CONNECTION LOST ---
        function triggerConnectionLost() {
            tBox.style.opacity = '0';
            setTimeout(() => {
                switchScreen(sLost);
                setTimeout(() => {
                    switchScreen(sReconn);
                    document.getElementById('fill-wrapper').style.height = '0%';
                    setTimeout(() => {
                        document.getElementById('fill-wrapper').style.height = '100%';
                    }, 500);
                    setTimeout(() => {
                        switchScreen(sTerm);
                        tBox.style.opacity = '1';
                        prepareText(part2);
                        setTimeout(() => {
                            cursor.style.display = 'inline-block';
                            typeNext(transitionToFinal); 
                        }, 800);
                    }, 4500); 
                }, 4000); 
            }, 1000); 
        }

        // --- PHASE 3: THE EMOJI FINALE ---
        function transitionToFinal() {
            setTimeout(() => {
                tBox.style.opacity = '0';
                setTimeout(() => {
                    switchScreen(sFinal);
                }, 1000);
            }, 2000); 
        }

        const tapCatcher = document.getElementById('tap-catcher');
        const finalUiText = document.getElementById('final-ui-text');
        const floatCont = document.getElementById('float-container');
        const impactCont = document.getElementById('impact-container');
        const finalArrows = document.querySelectorAll('.arrow-layer');
        let finalStarted = false;
        let snapStarted = false;

        // First click triggers the float and arrow strike
        tapCatcher.addEventListener('click', triggerFinalAnimation);
        tapCatcher.addEventListener('touchstart', triggerFinalAnimation);

        function triggerFinalAnimation(e) {
            e.preventDefault();
            if(finalStarted) return;
            finalStarted = true;
            
            tapCatcher.style.display = 'none';
            finalUiText.style.opacity = '0';
            
            floatCont.classList.add('begin-float');
            
            setTimeout(() => {
                finalArrows.forEach(a => a.classList.add('shoot-arrow'));
                impactCont.classList.add('trigger-impact');
                
                // Once the arrow hits, wait 1.2 seconds, then re-enable touch for the dust effect
                setTimeout(() => {
                    finalUiText.innerText = ""; // Keeps the screen clean
                    tapCatcher.style.display = 'block'; 
                    
                    // Switch listeners to the Thanos snap effect
                    tapCatcher.removeEventListener('click', triggerFinalAnimation);
                    tapCatcher.removeEventListener('touchstart', triggerFinalAnimation);
                    tapCatcher.addEventListener('click', triggerThanosSnap);
                    tapCatcher.addEventListener('touchstart', triggerThanosSnap);
                }, 1200);
                
            }, 1200);
        }

        // --- PHASE 4: THANOS DUST & SMOOTH REDIRECT ---
        function triggerThanosSnap(e) {
            e.preventDefault();
            if(snapStarted) return;
            snapStarted = true;
            
            tapCatcher.style.display = 'none'; // Lock out further taps
            
            // Get the exact coordinates of the heart container
            const rect = floatCont.getBoundingClientRect();
            
            // Hide the original heart instantly
            impactCont.style.opacity = '0';
            
            // Color palette representing the heart and arrow
            const colors = ['#ff3b30', '#ff6961', '#b07d5b', '#ffffff', '#ced4da'];
            
            // Generate 80 dust particles
            for(let i = 0; i < 80; i++) {
                let p = document.createElement('div');
                p.className = 'dust-particle';
                
                // Random size (2px to 6px)
                p.style.width = (Math.random() * 4 + 2) + 'px';
                p.style.height = p.style.width;
                
                // Random color from our palette
                p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                // Random starting position within the bounds of where the heart was
                p.style.left = (rect.left + Math.random() * rect.width) + 'px';
                p.style.top = (rect.top + Math.random() * rect.height) + 'px';
                
                document.body.appendChild(p);
                
                // Physics: Scatter outwards and slightly downwards
                let tx = (Math.random() - 0.5) * 350; // Spread X
                let ty = (Math.random() - 0.5) * 300 + 100; // Spread Y (biased down)
                let rot = (Math.random() - 0.5) * 360; // Spin
                
                // Web Animations API for smooth hardware-accelerated movement
                p.animate([
                    { transform: 'translate(0,0) rotate(0deg)', opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px) rotate(${rot}deg)`, opacity: 0 }
                ], {
                    duration: 1200 + Math.random() * 1500, // Varying speeds
                    easing: 'cubic-bezier(0.25, 1, 0.5, 1)',
                    fill: 'forwards'
                });
                
                // Clean up DOM after animation
                setTimeout(() => p.remove(), 3000);
            }
            
            // Initiate the smooth, seamless redirect
            setTimeout(() => {
                // The body is already black, so we just fade out any lingering elements by dropping body opacity
                document.body.style.transition = 'opacity 1s ease';
                document.body.style.opacity = '0';
                
                setTimeout(() => {
                    window.location.href = 'continue.html';
                }, 1000); // Trigger navigation precisely when fade finishes
                
            }, 1800); // Let the dust animation play out for 1.8 seconds before fading out
        }

    </script>
</body>
</html>
