<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Story</title>
    <style>
        body { background-color: #fff0f3; font-family: 'Georgia', serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .slideshow-container { text-align: center; width: 90%; max-width: 450px; background: white; padding: 25px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .slide { display: none; animation: fadeIn 1s; }
        .active { display: block; }
        img { width: 100%; height: 350px; object-fit: cover; border-radius: 20px; }
        .caption { font-size: 1.2rem; color: #d63384; margin: 20px 0; font-style: italic; min-height: 50px; }
        button { background-color: #ff6b81; color: white; border: none; padding: 12px 25px; border-radius: 50px; cursor: pointer; font-size: 1rem; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="slideshow-container">
        <div class="slide active">
            <img src="1.jpg">
            <div class="caption">"The first photo we ever took together."</div>
        </div>
        <div class="slide">
            <img src="2.jpg">
            <div class="caption">"I love your smile in this one."</div>
        </div>
        <div class="slide">
            <img src="10.jpg">
            <div class="caption">"To many more adventures! I love you. ❤️"</div>
        </div>

        <button onclick="nextSlide()">Next Memory →</button>
        <p id="counter" style="color: #ffb6c1; margin-top: 10px;">1 / 10</p>
    </div>

    <script>
        let current = 0;
        const slides = document.querySelectorAll('.slide');
        function nextSlide() {
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
            document.getElementById('counter').innerText = `${current + 1} / ${slides.length}`;
        }
    </script>
</body>
</html>
